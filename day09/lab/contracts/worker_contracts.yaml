# Worker Contracts — Day 09 Lab
# Contract này mô tả structure đang chạy trong source code hiện tại.
# Mục tiêu là phản ánh đúng runtime behavior, không phải thiết kế kỳ vọng của sprint cũ.

version: "1.1"
updated_at: "2026-04-14"

# ─────────────────────────────────────────────
# Supervisor
# ─────────────────────────────────────────────

supervisor:
  name: supervisor
  description: "Phân tích task và quyết định route. KHÔNG tự trả lời domain knowledge."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi từ user"
  output:
    supervisor_route:
      type: string
      enum: ["retrieval_worker", "policy_tool_worker", "human_review"]
      required: true
    route_reason:
      type: string
      required: true
      description: "Lý do cụ thể tại sao chọn route này"
    risk_high:
      type: boolean
      required: true
    needs_tool:
      type: boolean
      required: true
      description: "True nếu task thuộc access/refund policy hoặc multi-hop cần tool reasoning"
  routing_rules:
    - condition: "task là multi-hop access + incident/SLA"
      route: "policy_tool_worker"
      notes: "Current implementation ưu tiên policy_tool_worker khi query đồng thời có access keyword và incident keyword."
    - condition: "task chứa keyword access/security như 'cấp quyền', 'access', 'level 2', 'level 3', 'level 4', 'approval', 'security', 'contractor', 'admin access'"
      route: "policy_tool_worker"
      notes: "Access questions được xem là policy path, kể cả khi không có chunk đầu vào."
    - condition: "task chứa refund policy markers như 'có được hoàn tiền', 'flash sale', 'license', 'subscription', 'trước 01/02', 'ngoại lệ'"
      route: "policy_tool_worker"
      notes: "Chỉ các câu refund mang tính eligibility/exception mới route sang policy_tool_worker."
    - condition: "task chứa incident/SLA keywords như 'P1', 'SLA', 'ticket', 'escalation', 'incident', 'on-call', 'pagerduty'"
      route: "retrieval_worker"
      notes: "Incident/SLA factual queries hiện đi retrieval_worker."
    - condition: "task chứa refund keywords nhưng mang tính factual như 'bao nhiêu ngày', 'mấy ngày', 'bao lâu'"
      route: "retrieval_worker"
      notes: "Supervisor tránh over-orchestrate với refund fact query."
    - condition: "không match các điều kiện ở trên"
      route: "retrieval_worker"
      notes: "Fallback mặc định là retrieval_worker."
  risk_rules:
    - condition: "task chứa 'ERR-', 'emergency', 'khẩn cấp', '2am', 'ngoài giờ'"
      sets:
        risk_high: true
    - condition: "ngược lại"
      sets:
        risk_high: false
  tool_rules:
    - condition: "task là access policy, refund policy, hoặc multi-hop access + incident"
      sets:
        needs_tool: true
    - condition: "ngược lại"
      sets:
        needs_tool: false
  constraints:
    - "Supervisor không được tự trả lời policy questions."
    - "route_reason không được rỗng."
    - "Nếu risk_high=True thì route_reason phải nêu được tín hiệu risk."
    - "Graph vẫn giữ human_review node như một edge hợp lệ, nhưng supervisor hiện không route ERR-* sang human_review theo mặc định."
  actual_implementation:
    status: "implemented"
    notes: "Routing phản ánh graph.py hiện tại: access/refund policy → policy_tool_worker; incident/SLA và refund factual → retrieval_worker."

# ─────────────────────────────────────────────
# Retrieval Worker
# ─────────────────────────────────────────────

retrieval_worker:
  name: retrieval_worker
  file: workers/retrieval.py
  description: "Tìm kiếm evidence từ Chroma DB bằng dense hoặc hybrid retrieval, có thể rerank."
  input:
    task:
      type: string
      required: true
      description: "Câu hỏi cần tìm evidence"
    top_k:
      type: integer
      required: false
      default: 3
      description: "Số chunks cuối cùng cần trả về"
    retrieval_top_k:
      type: integer
      required: false
      description: "Legacy alias; runtime vẫn đọc để tương thích nếu top_k không có"
  output:
    retrieved_chunks:
      type: array
      required: true
      description: "List of chunk objects sau retrieval + optional rerank"
      items:
        text: string
        source: string
        score: float
        metadata: object
    retrieved_sources:
      type: array
      required: true
      description: "Unique list of source filenames"
    worker_io_logs:
      type: array
      required: true
      description: "Append-only log của worker"
      items:
        worker: string
        input:
          task: string
          top_k: integer
        output:
          chunks_count: integer
          sources: array
          retrieval_backend: string
          retrieval_mode: string
          search_top_k: integer
          db_path: string
          collection: string
        error:
          code: string
          reason: string
  error_format:
    code: "RETRIEVAL_FAILED"
    reason: string
  constraints:
    - "Nếu không tìm thấy thì phải trả về retrieved_chunks=[] và retrieved_sources=[]."
    - "Không tạo fake policy result trong retrieval worker."
    - "Worker chỉ mutate retrieved_chunks, retrieved_sources, history, workers_called và worker_io_logs."
    - "Backend hiện tại ghi nhận là local_day09_on_day08_index trong worker_io output."
  actual_implementation:
    status: "implemented"
    notes: "run() gọi retrieve(task, top_k), và retrieve() tự chọn mode dense/hybrid, search_top_k, rerank, db_path, collection."

# ─────────────────────────────────────────────
# Policy Tool Worker
# ─────────────────────────────────────────────

policy_tool_worker:
  name: policy_tool_worker
  file: workers/policy_tool.py
  description: "Kiểm tra policy theo domain refund, access hoặc incident_access; có thể gọi MCP tools và enrich chunks."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Context từ retrieval_worker hoặc context đã có trong state"
    needs_tool:
      type: boolean
      required: false
      default: false
      description: "True → worker được phép gọi MCP tools"
    risk_high:
      type: boolean
      required: false
      default: false
      description: "Flag từ supervisor để worker biết query có rủi ro cao"
  output:
    policy_result:
      type: object
      required: true
      properties:
        domain:
          type: string
          example: "refund | access | incident_access | unknown"
        policy_applies:
          type: boolean
          description: "Kết luận rule path hiện tại có áp dụng/cho phép hay không"
        policy_name:
          type: string
          example: "refund_policy_v4 | access_control_sop | incident_access_composite"
        exceptions_found:
          type: array
          description: "Danh sách exceptions hoặc blocking conditions tìm thấy"
          items:
            type: object
            properties:
              type: string
              rule: string
              source: string
        source:
          type: array
          description: "Nguồn tài liệu đã dùng để kết luận"
        policy_version_note:
          type: string
          description: "Note về temporal scope hoặc version mismatch nếu có"
        explanation:
          type: string
          description: "Giải thích ngắn về cách worker kết luận"
        tool_findings:
          type: object
          description: "Structured facts từ MCP tools và parser nội bộ"
          properties:
            has_mock_data: boolean
            temporal_scope_gap: boolean
            access_level: integer
            requester_role: string
            is_emergency: boolean
            temporary_request: boolean
            can_grant: boolean
            required_approvers: array
            emergency_override: boolean
            notes: array
            source: string
            ticket: object
    mcp_tools_used:
      type: array
      description: "Danh sách MCP tool calls thực hiện trong run"
      items:
        tool: string
        input: object
        output: object
        error: object
        timestamp: string
    retrieved_chunks:
      type: array
      description: "Policy worker có thể enrich lại retrieved_chunks trong state cho multi-hop hoặc domain-specific retrieval"
    retrieved_sources:
      type: array
      description: "Nguồn sau khi enrich chunks"
    worker_io_logs:
      type: array
      required: true
  error_format:
    code: "POLICY_CHECK_FAILED"
    reason: string
  constraints:
    - "Phải hỗ trợ ít nhất các domain: refund, access, incident_access, unknown."
    - "Refund phải detect exception cases như flash_sale, digital_product, activated_product khi có evidence."
    - "Nếu domain là access/incident_access và parse được access level thì worker nên gọi check_access_permission."
    - "Nếu thiếu chunks và needs_tool=True thì worker được phép gọi search_kb trước khi phân tích policy."
    - "Không được tự bịa policy rules ngoài tài liệu hoặc tool_findings."
    - "Temporal refund gap phải được phản ánh qua policy_version_note và tool_findings.temporal_scope_gap."
  actual_implementation:
    status: "implemented"
    notes: "Current run() có thể gọi search_kb(top_k=4), enrich chunks theo domain, gọi check_access_permission, và thêm get_ticket_info cho incident_access có ticket/P1/Jira."

# ─────────────────────────────────────────────
# Synthesis Worker
# ─────────────────────────────────────────────

synthesis_worker:
  name: synthesis_worker
  file: workers/synthesis.py
  description: "Tổng hợp câu trả lời từ evidence. Ưu tiên deterministic template cho refund/access/incident_access; fallback sang grounded LLM cho domain còn lại."
  input:
    task:
      type: string
      required: true
    retrieved_chunks:
      type: array
      required: false
      description: "Evidence từ retrieval_worker hoặc policy_tool_worker"
    policy_result:
      type: object
      required: false
      description: "Policy check result từ policy_tool_worker"
  output:
    final_answer:
      type: string
      required: true
      description: "Câu trả lời cuối"
    sources:
      type: array
      required: true
      description: "Sources được cite trong answer"
    confidence:
      type: float
      required: true
      description: "Heuristic confidence 0.0-1.0"
    worker_io_logs:
      type: array
      required: true
      items:
        worker: string
        input:
          task: string
          chunks_count: integer
          has_policy: boolean
        output:
          answer_length: integer
          sources: array
          confidence: float
          generation_mode: string
        error:
          code: string
          reason: string
  error_format:
    code: "SYNTHESIS_FAILED"
    reason: string
  constraints:
    - "Nếu không có chunks và cũng không có structured policy evidence thì phải abstain."
    - "Refund/access/incident_access ưu tiên deterministic_template thay vì cho LLM tự suy diễn."
    - "Structured policy result thắng prose chunk nếu hai nguồn mâu thuẫn."
    - "Không được dùng kiến thức ngoài context được cung cấp."
  actual_implementation:
    status: "implemented"
    notes: "run() ghi generation_mode vào worker_io output; confidence hiện là heuristic score, không phải calibrated probability."

# ─────────────────────────────────────────────
# MCP Server
# ─────────────────────────────────────────────

mcp_server:
  name: mcp_server
  file: mcp_server.py
  description: "Mock MCP Server với 2 cách gọi: dispatch_tool() in-process và FastAPI HTTP endpoints."
  tools:
    search_kb:
      input:
        query: string
        top_k: integer
      output:
        chunks: array
        sources: array
        total_found: integer
        retrieval_mode: string
        search_top_k: integer
        collection: string
    get_ticket_info:
      input:
        ticket_id: string
      output:
        ticket_id: string
        priority: string
        status: string
        assignee: string
        created_at: string
        sla_deadline: string
        escalated: boolean
        escalated_to: string
    check_access_permission:
      input:
        access_level: integer
        requester_role: string
        is_emergency: boolean
      output:
        can_grant: boolean
        required_approvers: array
        emergency_override: boolean
        notes: array
        source: string
    create_ticket:
      input:
        priority: string
        title: string
        description: string
      output:
        ticket_id: string
        priority: string
        title: string
        status: string
        url: string
  constraints:
    - "dispatch_tool() hiện raise ValueError nếu tool không tồn tại."
    - "tool_search_kb() dùng cùng retrieval path với workers/retrieval.py và có thể fallback sang mock_data nếu runtime retrieval lỗi."
    - "HTTP API layer sẽ raise HTTPException 404 cho unknown tool."
  actual_implementation:
    status: "implemented_with_runtime_dependency"
    notes: "Local dispatch đã có sẵn, nhưng module import hiện vẫn yêu cầu fastapi/uvicorn được cài do các import top-level."
